<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container">
    <h1>Cadastro de Usuário</h1>

    <form id="formCadastro">
      <label for="nome_completo">Nome completo</label>
      <input type="text" id="nome_completo" name="nome_completo" required>

      <label for="email">Email</label>
      <input type="text" id="email" name="email" required>

      <label for="telefone">Telefone</label>
      <input type="text" id="telefone" name="telefone" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" required>

      <label for="data_nascimento">Data de nascimento</label>
      <input type="text" id="data_nascimento" name="data_nascimento" placeholder="DD/MM/AAAA" maxlength="10">

      <label for="tipo_uso">Como você deseja utilizar nossa plataforma?</label>
      <select id="tipo_uso" name="tipo_uso" required>
        <option value="">Selecione uma opção</option>
        <option value="contratar">Contratar Serviços</option>
        <option value="divulgar">Divulgar serviços</option>
      </select>

      <section id="camposProfissional" class="campos-profissional oculto">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">

        <div class="servicos-header">
          <label for="inputServico">Serviços prestados</label>
          <small>Adicionar até 10 serviços</small>
        </div>

        <div class="servicos-box" id="servicosBox">
          <div class="tags-container" id="tagsContainer"></div>
          <input
            type="text"
            id="inputServico"
            placeholder="Digite um serviço e pressione Enter"
            maxlength="40"
          >
        </div>

        <input type="hidden" id="servicos_prestados" name="servicos_prestados">

        <label for="sobre_profissional">Fale um pouco sobre você</label>
        <textarea
          id="sobre_profissional"
          name="sobre_profissional"
          rows="5"
          maxlength="500"
          placeholder="Descreva sua experiência, especialidades e diferenciais"
        ></textarea>
      </section>

      <label for="cep">CEP</label>
      <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" required>

      <label for="rua">Rua</label>
      <input type="text" id="rua" name="rua" required>

      <label for="bairro">Bairro</label>
      <input type="text" id="bairro" name="bairro" required>

      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" name="cidade" required>

      <label for="estado">Estado</label>
      <input type="text" id="estado" name="estado" maxlength="2" required>

      <label for="numero">Número</label>
      <input type="text" id="numero" name="numero" required>

      <label for="complemento">Complemento</label>
      <input type="text" id="complemento" name="complemento">

      <button type="submit">Cadastrar</button>
    </form>

    <p id="mensagem" class="mensagem"></p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
